<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Tofunmi Ayotunde | Marketing Data Analysis</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { 
            bgDark: '#0b1120', 
            accentCyan: '#22d3ee' 
          }
        }
      }
    }
  </script>

  <style>
    /* Subtle glassmorphism effect for the form card */
    .glass-card {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>

<body class="bg-bgDark text-slate-300 antialiased font-sans min-h-screen flex flex-col selection:bg-accentCyan selection:text-bgDark">

  <div class="max-w-3xl mx-auto px-6 pt-16 pb-20 w-full flex-grow">
    
    <!-- Back Navigation -->
    <a href="index.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-white transition-colors mb-10 font-semibold group">
      <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Back to Portfolio
    </a>

    <div class="glass-card rounded-3xl p-8 md:p-12 relative overflow-hidden shadow-2xl">
      <!-- Decorative background glow -->
      <div class="absolute top-0 right-0 w-64 h-64 bg-accentCyan/10 rounded-full blur-3xl -z-10 translate-x-1/2 -translate-y-1/2"></div>
      
      <h1 class="text-3xl md:text-5xl font-extrabold text-white mb-4">Let's work together.</h1>
      <p class="text-lg text-slate-400 mb-10">Fill out the form below to discuss your tracking, reporting, or data pipeline needs.</p>

      <!-- Note: Keep your Formspree endpoint in the action attribute -->
      <form action="https://formspree.io/f/YOUR_ENDPOINT_HERE" method="POST" class="space-y-6 relative z-10">
        
        <div>
          <label for="name" class="block text-sm font-semibold text-slate-300 mb-2">Name</label>
          <input type="text" id="name" name="name" required placeholder="John Doe" 
                 class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accentCyan focus:ring-1 focus:ring-accentCyan transition-colors">
        </div>
        
        <div>
          <label for="email" class="block text-sm font-semibold text-slate-300 mb-2">Email</label>
          <input type="email" id="email" name="email" required placeholder="john@company.com" 
                 class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accentCyan focus:ring-1 focus:ring-accentCyan transition-colors">
        </div>
        
        <div>
          <label for="project" class="block text-sm font-semibold text-slate-300 mb-2">What do you need help with?</label>
          <input type="text" id="project" name="project" placeholder="e.g., GA4 Setup, Power Query Automation..." 
                 class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accentCyan focus:ring-1 focus:ring-accentCyan transition-colors">
        </div>
        
        <div>
          <label for="message" class="block text-sm font-semibold text-slate-300 mb-2">Details</label>
          <textarea id="message" name="message" rows="5" required placeholder="Tell me a bit about your current data setup and your goals..." 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accentCyan focus:ring-1 focus:ring-accentCyan transition-colors resize-y"></textarea>
        </div>
        
        <button type="submit" class="w-full py-4 mt-4 rounded-xl font-bold text-bgDark bg-accentCyan hover:bg-cyan-300 shadow-[0_0_15px_rgba(34,211,238,0.4)] transition-all flex justify-center items-center gap-2 group">
          Send Message 
          <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </button>

      </form>
    </div>
  </div>

</body>
</html>
